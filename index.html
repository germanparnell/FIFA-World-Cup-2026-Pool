  const loading = document.getElementById('__bundler_loading');

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

">Points<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;text-align:center;padding:12px 4px;border-radius:12px;background:#0C1322;border:1px solid rgba(255,255,255,.06)\"><div style=\"font:400 26px/0.9 Anton;color:#34E89E\">{{ me.exact }}<\u002Fdiv><div style=\"font:600 9px Barlow;letter-spacing:.12em;color:#6B7691;text-transform:uppercase;margin-top:4px\">Exact<\u002Fdiv><\u002Fdiv>\n        <div style=\"flex:1;text-align:center;padding:12px 4px;border-radius:12px;background:#0C1322;border:1px solid rgba(255,255,255,.06)\"><div style=\"font:400 26px/0.9 Anton;color:#FFB23E\">{{ me.correct }}<\u002Fdiv><div style=\"font:600 9px Barlow;letter-spacing:.12em;color:#6B7691;text-transform:uppercase;margin-top:4px\">Results<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ me.hasUpcoming }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin:0 18px 11px\"><div style=\"font:700 12px Barlow;letter-spacing:.16em;color:#8C97B2;text-transform:uppercase\">⚽ Coming up<\u002Fdiv><div style=\"flex:1;height:1px;background:rgba(255,255,255,.07)\"><\u002Fdiv><\u002Fdiv>\n    <div style=\"padding:0 16px\">\n      <sc-for list=\"{{ me.upcoming }}\" as=\"i\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:11px 13px;border-radius:13px;background:#0C1322;border:1px solid rgba(255,255,255,.07);margin-bottom:8px\">\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font:600 9.5px Barlow;letter-spacing:.1em;color:#6B7691;text-transform:uppercase;margin-bottom:5px\">{{ i.when }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:3px\"><span style=\"font-size:17px\">{{ i.fh }}<\u002Fspan><span style=\"font:700 13px Barlow Semi Condensed,Barlow;color:#E6EAF4;text-transform:uppercase\">{{ i.home }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"font-size:17px\">{{ i.fa }}<\u002Fspan><span style=\"font:700 13px Barlow Semi Condensed,Barlow;color:#E6EAF4;text-transform:uppercase\">{{ i.away }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:0 0 auto;text-align:center\"><div style=\"font:600 8.5px Barlow;letter-spacing:.1em;color:#6B7691;text-transform:uppercase;margin-bottom:3px\">My pick<\u002Fdiv><div style=\"font:400 21px Anton;color:{{ i.predColor }};letter-spacing:.04em\">{{ i.pred }}<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ me.hasPlayed }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"display:flex;align-items:center;gap:10px;margin:18px 18px 11px\"><div style=\"font:700 12px Barlow;letter-spacing:.16em;color:#8C97B2;text-transform:uppercase\">📊 Results<\u002Fdiv><div style=\"flex:1;height:1px;background:rgba(255,255,255,.07)\"><\u002Fdiv><\u002Fdiv>\n    <div style=\"padding:0 16px\">\n      <sc-for list=\"{{ me.played }}\" as=\"i\" hint-placeholder-count=\"6\">\n        <div style=\"display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;background:{{ i.cardBg }};border:1px solid {{ i.cardBorder }};margin-bottom:8px\">\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"font:600 9.5px Barlow;letter-spacing:.1em;color:#6B7691;text-transform:uppercase;margin-bottom:5px\">{{ i.when }}<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:3px\"><span style=\"font-size:17px\">{{ i.fh }}<\u002Fspan><span style=\"font:700 13px Barlow Semi Condensed,Barlow;color:#E6EAF4;text-transform:uppercase\">{{ i.home }}<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"font-size:17px\">{{ i.fa }}<\u002Fspan><span style=\"font:700 13px Barlow Semi Condensed,Barlow;color:#E6EAF4;text-transform:uppercase\">{{ i.away }}<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:0 0 auto;text-align:center\"><div style=\"font:600 8.5px Barlow;letter-spacing:.1em;color:#6B7691;text-transform:uppercase;margin-bottom:3px\">Pick<\u002Fdiv><div style=\"font:400 19px Anton;color:{{ i.predColor }};letter-spacing:.04em\">{{ i.pred }}<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:0 0 auto;text-align:center\"><div style=\"font:600 8.5px Barlow;letter-spacing:.1em;color:#6B7691;text-transform:uppercase;margin-bottom:3px\">Final<\u002Fdiv><div style=\"font:400 19px Anton;color:#C3CBDD;letter-spacing:.04em\">{{ i.actual }}<\u002Fdiv><\u002Fdiv>\n          <span style=\"flex:0 0 auto;min-width:36px;text-align:center;padding:5px 0;border-radius:8px;background:{{ i.pillBg }};color:{{ i.pillFg }};font:400 15px Anton\">{{ i.pillTxt }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsc-if>\n\n<\u002Fsc-if>\n\n<div style=\"text-align:center;padding:24px 24px 0;font:600 11px Barlow;color:#4E5872;letter-spacing:.02em\">Scores you enter are saved on this device · {{ playedCount }} of {{ totalCount }} matches played<\u002Fdiv>\n\n<\u002Fsc-if>\n\n<sc-if value=\"{{ notReady }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"min-height:80vh;display:grid;place-items:center;color:#6B7691;font:700 13px Barlow;letter-spacing:.1em;text-transform:uppercase\">Loading pool…<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:420,&quot;height&quot;:900},&quot;exactPoints&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:1,&quot;max&quot;:10},&quot;resultPoints&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:1,&quot;tsType&quot;:&quot;number&quot;,&quot;min&quot;:0,&quot;max&quot;:5},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#3D7BFF&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    let ov = {};\n    try { ov = JSON.parse(localStorage.getItem('wc2026_ov_v1')||'{}') || {}; } catch(e){ ov = {}; }\n    let me = null; try { me = localStorage.getItem('wc2026_me_v1') || null; } catch(e){}\n    this.state = { ov, view:'board', exp:{}, now:Date.now(), tick:0, me };\n    this.data = (typeof window!=='undefined' && window.WC_DATA) ? window.WC_DATA : null;\n  }\n  componentDidMount(){\n    this._t = setInterval(()=>this.setState({now:Date.now()}), 1000);\n    if(!this.data){\n      this._poll = setInterval(()=>{\n        if(window.WC_DATA){ this.data = window.WC_DATA; clearInterval(this._poll); this.forceUpdate(); }\n      }, 60);\n    }\n  }\n  componentWillUnmount(){ clearInterval(this._t); clearInterval(this._poll); }\n\n  persist(ov){ try{ localStorage.setItem('wc2026_ov_v1', JSON.stringify(ov)); }catch(e){} }\n  short(n){ return n.split(' ')[0]; }\n  initials(n){ const p=n.split(' '); return ((p[0]||'')[0]||'')+((p[1]||'')[0]||''); }\n\n  baked(i){ const m=this.data.matches[i]; return m.ah!=null ? {h:String(m.ah),a:String(m.aa)} : {h:'',a:''}; }\n  vals(i){ const o=this.state.ov; return o[i]!==undefined ? o[i] : this.baked(i); }\n  num(i){ const v=this.vals(i); const h=(v.h||'').trim(), a=(v.a||'').trim(); if(h===''||a===''||isNaN(h)||isNaN(a)) return null; return [Number(h),Number(a)]; }\n  isEdited(i){ const o=this.state.ov; if(o[i]===undefined) return false; const m=this.data.matches[i]; if(m.ah==null) return (o[i].h!==''||o[i].a!==''); return o[i].h!==String(m.ah)||o[i].a!==String(m.aa); }\n\n  onScore(i, side, raw){\n    const clean=(raw||'').replace(/[^0-9]/g,'').slice(0,2);\n    const cur={...this.vals(i)}; cur[side]=clean;\n    const ov={...this.state.ov, [i]:cur};\n    this.setState({ov}); this.persist(ov);\n  }\n  resetMatch(i){ const ov={...this.state.ov}; delete ov[i]; this.setState({ov}); this.persist(ov); }\n  toggle(i){ const exp={...this.state.exp}; exp[i]=!exp[i]; this.setState({exp}); }\n  setMe(name){ try{ localStorage.setItem('wc2026_me_v1', name); }catch(e){} this.setState({me:name}); }\n  clearMe(){ try{ localStorage.removeItem('wc2026_me_v1'); }catch(e){} this.setState({me:null}); }\n\n  score(ph,pa,r,EX,RE){ if(ph==null||pa==null||!r) return 0; const[ah,aa]=r; if(ph===ah&&pa===aa) return EX; return Math.sign(ph-pa)===Math.sign(ah-aa)?RE:0; }\n\n  fmtCd(ms){\n    if(ms<=0) return {cd:'LIVE', label:'kickoff', live:true};\n    const d=Math.floor(ms/86400000); ms-=d*86400000;\n    const h=Math.floor(ms/3600000); ms-=h*3600000;\n    const m=Math.floor(ms/60000); ms-=m*60000;\n    const s=Math.floor(ms/1000);\n    const p=n=>String(n).padStart(2,'0');\n    if(d>0) return {cd:d+'d '+p(h)+'h '+p(m)+'m', label:'until kickoff', live:false};\n    return {cd:p(h)+':'+p(m)+':'+p(s), label:'until kickoff', live:false};\n  }\n\n  renderVals(){\n    if(!this.data) return { ready:false, notReady:true };\n    const D=this.data, players=D.players, M=D.matches;\n    const EX=this.props.exactPoints ?? 3, RE=this.props.resultPoints ?? 1;\n    const ACC=this.props.accent ?? '#3D7BFF';\n    const accentGlow = ACC.length===7 ? ACC+'3a' : 'rgba(61,123,255,.23)';\n    const accentBorder = ACC.length===7 ? ACC+'4d' : 'rgba(61,123,255,.3)';\n\n    // effective results\n    const res = M.map((m,i)=>this.num(i));\n    const playedCount = res.filter(r=>r).length;\n\n    // standings\n    const stats = players.map((name,j)=>{\n      let pts=0,exact=0,correct=0;\n      M.forEach((m,i)=>{ const r=res[i]; if(!r) return; const[ph,pa]=m.p[j]; if(ph==null||pa==null) return; const s=this.score(ph,pa,r,EX,RE); pts+=s; if(s===EX) exact++; else if(s===RE) correct++; });\n      return {name, short:this.short(name), initials:this.initials(name).toUpperCase(), pts, exact, correct, j};\n    });\n    stats.sort((a,b)=> b.pts-a.pts || b.exact-a.exact || a.name.localeCompare(b.name));\n    let lastPts=null,lastRank=0;\n    stats.forEach((s,idx)=>{ const rank = (s.pts===lastPts)?lastRank:idx+1; s.rank=rank; lastPts=s.pts; lastRank=rank; });\n    const leaderPts = stats.length?stats[0].pts:0;\n\n    const medalCol=['#FFCA3A','#C8D2E0','#D98A4E'];\n    const standings = stats.map(s=>{\n      const isLeader = s.rank===1 && leaderPts>0;\n      const medalIdx = s.rank<=3 ? s.rank-1 : -1;\n      return {\n        rank:s.rank, name:s.name, initials:s.initials, pts:s.pts, exact:s.exact, correct:s.correct,\n        isLeader,\n        rowBg: isLeader ? 'linear-gradient(180deg,#1c1c0f,#11172a)' : '#10172A',\n        rowBorder: isLeader ? 'rgba(255,202,58,.4)' : 'rgba(255,255,255,.07)',\n        accentBar: medalIdx>=0 ? medalCol[medalIdx] : 'transparent',\n        rankColor: medalIdx>=0 ? medalCol[medalIdx] : '#5C6680',\n        avBg: medalIdx>=0 ? medalCol[medalIdx] : '#26304A',\n        avFg: medalIdx>=0 ? '#0a0e18' : '#9AA4BD'\n      };\n    });\n\n    // podium 2,1,3\n    const sizes={1:{h:'92px',av:'52px',avf:'19px',ptsf:'34px'},2:{h:'72px',av:'44px',avf:'16px',ptsf:'28px'},3:{h:'58px',av:'44px',avf:'16px',ptsf:'28px'}};\n    const ped={1:'linear-gradient(180deg,#2a2410,#15182a)',2:'#161d30',3:'#161d30'};\n    const medals={1:'🥇',2:'🥈',3:'🥉'};\n    const shadow={1:'rgba(255,202,58,.4)',2:'rgba(200,210,224,.25)',3:'rgba(217,138,78,.25)'};\n    const byRank = r => stats.find(s=>s.rank===r) || stats[r-1];\n    const podium = [2,1,3].map(r=>{ const s=byRank(r)||{}; const sz=sizes[r]; return {\n      medal:medals[r], short:s.short||'—', initials:(s.initials||'—'), pts:s.pts??0,\n      color:medalCol[r-1], pedestal:ped[r], pedBorder:r===1?'rgba(255,202,58,.3)':'rgba(255,255,255,.08)',\n      shadow:shadow[r], h:sz.h, av:sz.av, avf:sz.avf, ptsf:sz.ptsf\n    };});\n\n    // next match\n    let nextIdx=-1; for(let i=0;i<M.length;i++){ if(!res[i]){ nextIdx=i; break; } }\n    let hasNext=false, next={};\n    if(nextIdx>=0){\n      hasNext=true; const m=M[nextIdx];\n      const cd=this.fmtCd((m.ko||0)-this.state.now);\n      const ko=m.ko?new Date(m.ko):null;\n      const kotime = ko ? ko.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}) : '';\n      const nexp = !!this.state.exp['next'+nextIdx];\n      const npreds = players.map((name,j)=>{ const[ph,pa]=m.p[j]; const has=ph!=null&&pa!=null;\n        return { short:this.short(name), pred: has?(ph+'–'+pa):'—', predColor: has?'#F2F5FC':'#566076', rowBg:'transparent' }; });\n      next={ fh:m.fh, fa:m.fa, home:m.home, away:m.away, meta:'Grp '+m.group+' · '+m.date.replace('.',' '), cd:cd.cd, cdLabel:cd.label, kotime:kotime,\n        expanded:nexp, chevTransform: nexp?'rotate(180deg)':'rotate(0deg)', toggleLabel: nexp?'Hide picks':'See everyone\\u2019s picks',\n        preds:npreds, onToggle:()=>{ const exp={...this.state.exp}; exp['next'+nextIdx]=!exp['next'+nextIdx]; this.setState({exp}); } };\n    }\n\n    // exact hits (recent first)\n    const hits=[];\n    for(let i=M.length-1;i>=0;i--){ const r=res[i]; if(!r) continue; const m=M[i];\n      players.forEach((name,j)=>{ const[ph,pa]=m.p[j]; if(ph===r[0]&&pa===r[1]){ hits.push({ short:this.short(name), fh:m.fh, fa:m.fa, score:r[0]+'–'+r[1], match:(m.home.length>9?m.home.slice(0,9):m.home)+' v '+(m.away.length>9?m.away.slice(0,9):m.away), date:m.date.replace('.',' ') }); } });\n      if(hits.length>=18) break;\n    }\n\n    // groups for matches view\n    const groups=[]; let cur=null;\n    M.forEach((m,i)=>{\n      const label=(m.day?m.day.slice(0,3):'')+' · '+m.date.replace('.',' ');\n      if(!cur || cur.label!==label){ cur={label, matches:[]}; groups.push(cur); }\n      const r=res[i]; const v=this.vals(i); const edited=this.isEdited(i);\n      const official = !!(M[i].ah!=null && !edited && r);\n      let sumE=0,sumC=0; if(r){ players.forEach((name,j)=>{ const[ph,pa]=m.p[j]; const s=this.score(ph,pa,r,EX,RE); if(s===EX)sumE++; else if(s===RE)sumC++; }); }\n      const expanded=!!this.state.exp[i];\n      const preds = players.map((name,j)=>{\n        const[ph,pa]=m.p[j];\n        const has = ph!=null && pa!=null;\n        const pred = has ? (ph+'–'+pa) : '—';\n        const s = r ? this.score(ph,pa,r,EX,RE) : null;\n        let pillBg='transparent',pillFg='#566076',pillTxt='·',rowBg='transparent',predColor='#AEB7CC';\n        if(s!=null){ if(s===EX){ pillBg='#34E89E';pillFg='#06231a';pillTxt='+'+EX;rowBg='rgba(52,232,158,.08)';predColor='#34E89E'; }\n          else if(s===RE){ pillBg='#FFB23E';pillFg='#2b1c00';pillTxt='+'+RE; }\n          else { pillBg='#222b42';pillFg='#7F8AA6';pillTxt='0'; predColor='#6F798A'; } }\n        return { short:this.short(name), pred, pillBg, pillFg, pillTxt, rowBg, predColor };\n      });\n      cur.matches.push({\n        group:m.group, home:m.home, away:m.away, fh:m.fh, fa:m.fa,\n        hVal:v.h||'', aVal:v.a||'',\n        onH:(e)=>this.onScore(i,'h',e.target.value),\n        onA:(e)=>this.onScore(i,'a',e.target.value),\n        stop:(e)=>e.stopPropagation(),\n        onToggle:()=>this.toggle(i),\n        onReset:(e)=>{ e.stopPropagation(); this.resetMatch(i); },\n        expanded, chevTransform: expanded?'rotate(180deg)':'rotate(0deg)',\n        played:!!r, edited, official, sumExact:sumE, sumCorrect:sumC, preds,\n        cardBg: r ? '#0F1526' : '#0C1322',\n        cardBorder: expanded ? accentBorder : 'rgba(255,255,255,.07)',\n        inBorderH: (v.h||'')!=='' ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.08)',\n        inBorderA: (v.a||'')!=='' ? 'rgba(255,255,255,.18)' : 'rgba(255,255,255,.08)'\n      });\n    });\n\n    // my picks view\n    const ordinal = n => { const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); };\n    const pillFor = (s)=>{ if(s===EX) return {bg:'#34E89E',fg:'#06231a',txt:'+'+EX,pc:'#34E89E'}; if(s===RE) return {bg:'#FFB23E',fg:'#2b1c00',txt:'+'+RE,pc:'#E6EAF4'}; return {bg:'#222b42',fg:'#7F8AA6',txt:'0',pc:'#6F798A'}; };\n    const roster = players.map(name=>{ const st=stats.find(s=>s.name===name)||{pts:0}; return { name, short:this.short(name), initials:this.initials(name).toUpperCase(), pts:st.pts, onPick:()=>this.setMe(name) }; });\n    const meName = this.state.me;\n    const meIdx = meName ? players.indexOf(meName) : -1;\n    const mePicked = meIdx>=0;\n    let me = {};\n    if(mePicked){\n      const st = stats.find(s=>s.name===meName) || {rank:0,pts:0,exact:0,correct:0};\n      const mkItem = (i)=>{ const m=M[i]; const[ph,pa]=m.p[meIdx]; const has=ph!=null&&pa!=null; const r=res[i];\n        const when=(m.day?m.day.slice(0,3):'')+' '+m.date.replace('.',' ')+' · Grp '+m.group;\n        const base={ when, fh:m.fh, fa:m.fa, home:m.home, away:m.away, pred: has?(ph+'–'+pa):'—', predColor: has?'#F2F5FC':'#566076' };\n        if(r){ const s=this.score(ph,pa,r,EX,RE); const pl=pillFor(s); return {...base, actual:r[0]+'–'+r[1], pillBg:pl.bg, pillFg:pl.fg, pillTxt:pl.txt, predColor:has?pl.pc:'#566076', cardBg:s===EX?'rgba(52,232,158,.06)':'#0F1526', cardBorder:s===EX?'rgba(52,232,158,.25)':'rgba(255,255,255,.07)'}; }\n        return base; };\n      const upcoming=[], played=[];\n      M.forEach((m,i)=>{ if(res[i]) played.push(i); else upcoming.push(i); });\n      me = { name:meName, initials:this.initials(meName).toUpperCase(), rankLabel: ordinal(st.rank)+' of '+players.length,\n        pts:st.pts, exact:st.exact, correct:st.correct,\n        upcoming: upcoming.map(mkItem), played: played.reverse().map(mkItem),\n        hasUpcoming: upcoming.length>0, hasPlayed: played.length>0 };\n    }\n\n    const view=this.state.view;\n    const tabBase='flex:1;padding:11px 4px;border:none;border-radius:10px;font:700 10.5px Barlow;letter-spacing:.02em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap;';\n    const tabOn = 'background:'+ACC+';color:#fff;box-shadow:0 4px 14px '+(ACC.length===7?ACC+'66':'rgba(61,123,255,.4)')+';';\n    const tabOff = 'background:transparent;color:#7B86A1;';\n    const boardBtnStyle = tabBase + (view==='board' ? tabOn : tabOff);\n    const matchesBtnStyle = tabBase + (view==='matches' ? tabOn : tabOff);\n    const meBtnStyle = tabBase + (view==='me' ? tabOn : tabOff);\n\n    return {\n      ready:true, notReady:false,\n      exactPts:EX, resPts:RE, accent:ACC, accentGlow, accentBorder,\n      hasNext, next,\n      podium, standings,\n      hasHits:hits.length>0, hits,\n      groups,\n      showBoard:view==='board', showMatches:view==='matches', showMe:view==='me',\n      onBoard:()=>this.setState({view:'board'}),\n      onMatches:()=>this.setState({view:'matches'}),\n      onMe:()=>this.setState({view:'me'}),\n      boardBtnStyle, matchesBtnStyle, meBtnStyle,\n      roster, mePicked, meNotPicked:!mePicked, me,\n      onSwitch:()=>this.clearMe(),\n      playedCount, totalCount:M.length\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
